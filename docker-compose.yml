services:
  postgres:
    image: postgres:16-alpine
    container_name: membra_sms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: membra
      POSTGRES_PASSWORD: membra
      POSTGRES_DB: membra_sms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U membra -d membra_sms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
